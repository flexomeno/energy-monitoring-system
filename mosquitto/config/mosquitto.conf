# Configuración del broker MQTT Mosquitto.
# Recibe publicaciones del Sonoff (Tasmota) y las entrega a Telegraf (suscriptor).

listener 1883           # Puerto MQTT estándar (mismo que configura Tasmota)
allow_anonymous true    # Permite conexión sin usuario/contraseña (Tasmota con credenciales vacías)
persistence true        # Guarda mensajes retenidos y estado del broker entre reinicios
