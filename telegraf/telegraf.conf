# Configuración de Telegraf para el pipeline MQTT → InfluxDB.
# Suscribe al tópico de telemetría de Tasmota y guarda los datos en la measurement "tasmota_energia".

[agent]
  interval = "10s"       # Frecuencia de recolección y escritura (cada 10 segundos)
  round_interval = true  # Alinea el intervalo al reloj del sistema (ej. :00, :10, :20...)

# Destino: InfluxDB 1.8 dentro del stack (hostname "influxdb" en Docker/Kubernetes)
[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "tasmota"      # Misma base de datos definida en docker-compose / kubernetes
  username = "admin"
  password = "admin123"

# Origen: mensajes JSON publicados por Tasmota en el broker Mosquitto
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  # Tópico de telemetría periódica de Tasmota (prefix "tele" + topic del dispositivo + "SENSOR")
  # Cambiar "tasmota_E8D2BC" por el ID de tu Sonoff si es diferente
  topics = ["tele/tasmota_E8D2BC/SENSOR"]
  data_format = "json"              # Tasmota publica el objeto ENERGY en formato JSON
  name_override = "tasmota_energia" # Nombre de la measurement en InfluxDB
  tagexclude = ["host"]             # Excluye el tag "host" de Telegraf para evitar ruido en los datos
